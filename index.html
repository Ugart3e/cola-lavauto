<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cola Lavadero</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lavadero">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<header>
<div class="title-area">
<h1>🚗 Cola del Lavadero</h1>
<p id="currentDate"></p>
</div>

<div class="stats">
<div class="stat-card"><span class="label">Coches</span><span id="queueCount" class="value">0</span></div>
<div class="stat-card"><span class="label">Último coche</span><span id="lastFinish">--</span></div>
<div class="stat-card"><span class="label">Tiempo restante</span><span id="remainingDay">--</span></div>
</div>
</header>

<section class="actions">
<button id="add45" class="primary">+ Completo<small>45 minutos</small></button>
<button id="addCustom" class="primary">+ Personalizado</button>
<button id="add25" class="primary">+ Interior / Exterior<small>25 minutos</small></button>
</section>

<section id="activeContainer"></section>

<section>
<h2>Cola</h2>
<div id="queue"></div>
</section>

<footer>
<button id="resetDay" class="danger">Reiniciar jornada</button>
</footer>
</div>

<div id="modalOverlay" class="hidden">
<div class="modal">
<h2 id="modalTitle">Nuevo coche</h2>
<form id="carForm">
<div class="field">
<label>Tipo</label>
<select id="carType">
<option value="25">Interior / Exterior (25 min)</option>
<option value="45">Completo (45 min)</option>
<option value="custom">Personalizado</option>
</select>
</div>

<div id="customMinutesContainer" class="field hidden">
    <label>Duración</label>

    <select id="customMinutes">
        <option value="15">15 minutos</option>
        <option value="30">30 minutos</option>
        <option value="45">45 minutos</option>
        <option value="60">1 hora</option>
        <option value="75">1 hora 15 minutos</option>
        <option value="90">1 hora 30 minutos</option>
        <option value="105">1 hora 45 minutos</option>
        <option value="120">2 horas</option>
        <option value="135">2 horas 15 minutos</option>
        <option value="150">2 horas 30 minutos</option>
        <option value="165">2 horas 45 minutos</option>
        <option value="180">3 horas</option>
    </select>

</div>
<div class="field">
<label>Cliente (opcional)</label>
<input type="text" id="clientName">
</div>

<div class="field">
<label>Teléfono (opcional)</label>
<input type="tel" id="clientPhone">
</div>

<div class="modalButtons">
<button type="button" id="cancelModal" class="secondary">Cancelar</button>
<button type="submit" class="primary">Guardar</button>
</div>
</form>
</div>
</div>

<div id="confirmOverlay" class="hidden">
<div class="confirmBox">
<h2>¿Seguro?</h2>
<p id="confirmText"></p>
<div class="modalButtons">
<button id="cancelConfirm" class="secondary">Cancelar</button>
<button id="acceptConfirm" class="danger">Aceptar</button>
</div>
</div>
</div>


<script type="module" src="script.js"></script>
</body>
</html>
